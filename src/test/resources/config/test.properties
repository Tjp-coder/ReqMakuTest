# 切换环境只需改 -Denv=prod，对应读取 config/prod.properties

# 被测系统地址
baseUrl=http://localhost
port=8080

# 数据库（从 v1 的 druid.properties 迁移，统一管理）
dbUrl=jdbc:mysql://127.0.0.1:3306/maku_boot?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT
dbUsername=root
dbPassword=root

# 登录账号（敏感信息在 CI 中用环境变量覆盖，不要提交真实密码）
authUsername=admin
authPassword=admin
